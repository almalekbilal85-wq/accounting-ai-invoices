
{% extends "invoices_app/base.html" %}
{% block body_block %}

<div class="container mt-5">

    <div class="card shadow rounded-4">

        <div class="card-body">

            <!-- Title -->
            <h2 class="mb-4">

                {% if not form.instance.pk %}
                    Ny kund
                {% else %}
                    Uppdatera kund
                {% endif %}

            </h2>

            <!-- Form -->
            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    {% for field in form %}

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% if field.errors %}
                                <div class="text-danger small">
                                    {{ field.errors }}
                                </div>
                            {% endif %}

                        </div>

                    {% endfor %}

                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2 mt-3">

                    <button type="submit" class="btn btn-success">
                        {% if not form.instance.pk %}
                            Skapa kund
                        {% else %}
                            Spara ändringar
                        {% endif %}
                    </button>

                    <a href="{% url 'invoices_app:customers_list' %}"
                       class="btn btn-secondary">
                        Avbryt
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
