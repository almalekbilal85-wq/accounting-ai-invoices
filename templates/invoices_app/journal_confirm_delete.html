{% extends "invoices_app/base.html" %}


{% block body_block %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow border-danger rounded-4">

                <div class="card-body text-center">

                    <!-- Warning Icon -->
                    <div class="mb-3">
                        <span style="font-size: 3rem;">⚠️</span>
                    </div>

                    <h3 class="text-danger mb-3">
                        Ta Bort Verifikation?
                    </h3>

                    <p class="mb-4">
                        Är du säker att du vill ta bort:
                        <br>
                        <strong>V.{{ journal.journal_number }} <p style="color: blue;">För kund</p> {{journal.customer.name}}</strong>
                        
                    </p>

                    <p class="text-muted small">
                        Detta kan inte ångras
                    </p>

                    <!-- Buttons -->
                    <form method="POST">

                        {% csrf_token %}

                        <div class="d-flex justify-content-center gap-2 mt-4">

                            <button type="submit" class="btn btn-danger">
                                Ja, Ta Bort
                            </button>

                            <a href="{% url 'invoices_app:journal_detail' journal.pk %}"
                               class="btn btn-secondary">
                                Avbryt
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
