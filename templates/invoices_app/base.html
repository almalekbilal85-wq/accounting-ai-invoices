<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting app</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">

    <div class="container-fluid px-4">

        <!-- Logo / Brand -->
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold fs-4"
           href="{% url 'index' %}">

            <span class="bg-success rounded-circle d-inline-block"
                  style="width:14px; height:14px;">
            </span>

            ALMALEK Bokföring

        </a>

        <!-- Mobile Button -->
        <button class="navbar-toggler border-0 shadow-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navbar Content -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left Links -->
            <ul class="navbar-nav ms-4">

                <li class="nav-item">

                    <a class="nav-link px-3 rounded-pill"
                       href="{% url 'index' %}">
                        Dashboard
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link px-3 rounded-pill"
                       href="{% url 'invoices_app:upload' %}">
                        Ladda upp
                    </a>

                </li>


            </ul>

            <!-- Right Side -->
            <div class="ms-auto d-flex align-items-center gap-3">

               

                <!-- Admin -->
           {% if user.is_authenticated %}


                 <!-- Quick Action -->
                <a href="{% url 'invoices_app:customers_list' %}"
                   class="btn btn-success rounded-pill px-4">

                    Kunder

                </a>
                
                <a href="{% url 'admin:index' %}"
                class="btn btn-outline-light rounded-pill px-4">
                    Admin
                </a>

                <form method="post"
                    action="{% url 'logout' %}"
                    class="d-inline">

                    {% csrf_token %}

                    <button type="submit"
                            class="btn btn-outline-danger rounded-pill px-4">
                        Logout
                    </button>

                </form>

            {% else %}

                <a href="{% url 'login' %}"
                class="btn btn-outline-light rounded-pill px-4">
                    Login
                </a>

            {% endif %}


            </div>

        </div>

    </div>

</nav>



<div class="container">
  {% block body_block %}

   {% endblock %}
</div>



</body>
</html>
