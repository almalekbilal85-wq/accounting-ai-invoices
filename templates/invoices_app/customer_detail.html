{% extends "invoices_app/base.html" %}

{% block body_block %}

<div class="container mt-5">

    <div class="card shadow rounded-4">

        <div class="card-body">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h2 class="mb-1">
                        {{ customer.name }}
                    </h2>

                    <p class="text-muted mb-0">
                        Kundens Detaljer
                    </p>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex gap-2">

                    <a href="{% url 'invoices_app:update_customer' customer.pk %}"
                       class="btn btn-warning">
                        Ändra
                    </a>

                    <a href="{% url 'invoices_app:delete_customer' customer.pk %}"
                       class="btn btn-danger">
                        Ta Bort
                    </a>

                </div>

            </div>

            <!-- Customer Info -->
            <div class="row">

                <div class="col-md-6 mb-4">

                    <div class="border rounded-3 p-3 h-100">

                        <h5 class="mb-3">
                            Basic Information
                        </h5>

                        <p>
                            <strong>Namn:</strong><br>
                            {{ customer.name }}
                        </p>

                        <p>
                            <strong>Organisationsnummer:</strong><br>
                            {{ customer.org_number }}
                        </p>

                    </div>

                </div>

                <div class="col-md-6 mb-4">

                    <div class="border rounded-3 p-3 h-100">

                        <h5 class="mb-3">
                            Address
                        </h5>

                        <p>
                            {{ customer.address }}
                        </p>

                    </div>

                </div>

            </div>

            <!-- Back Button -->
            <div class="mt-3">

                <a href="{% url 'invoices_app:customers_list' %}"
                   class="btn btn-secondary">
                    Tillbaka till kunder
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
