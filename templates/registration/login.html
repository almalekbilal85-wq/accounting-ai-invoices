{% extends "invoices_app/base.html" %}


{% load static %}


{% block body_block %}
<div class="container">

    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-md-5 col-lg-4">

            <div class="card login-card">

                <div class="card-body p-5">

                    <div class="login-logo">
                        📘
                    </div>

                    <div class="text-center mb-4">

                        <h1 class="login-title">
                            Sign In
                        </h1>

                        <p class="login-subtitle">
                            Access your accounting workspace
                        </p>

                    </div>

                    {% if form.errors %}
                        <div class="alert login-alert mb-4">
                            Invalid username or password.
                        </div>
                    {% endif %}

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            {{ form.username }}

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            {{ form.password }}

                        </div>

                        <button
                            type="submit"
                            class="btn btn-login w-100">
                            Sign In
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>


<link rel="stylesheet" href="{% static 'invoices_app/css/login.css' %}">
{% endblock %}
